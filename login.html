<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 드래곤 힐스 C.C.</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body class="auth-page">
  <nav class="top-nav">
    <a href="index.html" class="nav-logo">Dragon Hills</a>
    <div class="nav-links">
      <a href="login.html">로그인</a>
      <a href="signup.html" class="nav-signup-btn">회원가입</a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="reservation-container" style="width: 100%; max-width: 400px; border-top: 5px solid var(--primary);">
      <h2 style="margin-bottom: 30px;">로그인</h2>
      <form id="loginForm">
        <div class="form-group" style="margin-bottom: 20px;">
          <label>이메일</label>
          <input type="email" id="loginEmail" placeholder="example@email.com" required>
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
          <label>비밀번호</label>
          <input type="password" id="loginPassword" placeholder="비밀번호 입력" required>
        </div>
        <div style="text-align: right; margin-bottom: 20px;">
          <a href="#" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">비밀번호를 잊으셨나요?</a>
        </div>
        <button type="submit" class="submit-btn">
          로그인
        </button>
        <div style="margin-top: 20px; text-align: center; font-size: 0.9rem; color: #64748b;">
          계정이 없으신가요? <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">회원가입</a>
        </div>
      </form>
    </div>
  </section>

  <footer>
    <span class="footer-logo">Dragon Hills C.C.</span>
    <div class="footer-info">
      <p>Ratchaburi, Thailand | 한국인 고객 전용 서비스 운영 중</p>
      <p>Email: contact@dragonhillscc.com | Tel: 070-8997-3976</p>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Dragon Hills Golf & Country Club. All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module" src="./src/auth.js"></script>
</body>
</html>
